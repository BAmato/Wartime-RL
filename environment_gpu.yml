name: wartime-rl
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - matplotlib
  - pygame
  - pip:
      - torch==2.9.1+cu128
      - torchvision
      - torchaudio
      - --index-url https://download.pytorch.org/whl/cu128
      - gymnasium
      - tensorboard
      - tqdm
      - pillow